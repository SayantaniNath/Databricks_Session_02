version: 2

sources:
  - name: raw
    database: FINFLOW
    schema: RAW
    tables:
      - name: crypto_prices
        description: Raw crypto price records loaded from JSONL files
      - name: stock_prices
        description: Raw stock price records from yfinance

models:
  - name: stg_crypto_prices
    description: Cleaned and typed crypto price records
    columns:
      - name: price_key
        description: Surrogate key (symbol + ingested_at)
        tests:
          - unique
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: stg_stock_prices
    description: Cleaned and typed stock price records
    columns:
      - name: price_key
        tests:
          - unique
          - not_null
      - name: price_usd
        tests:
          - not_null

  - name: fact_price_movements
    description: Kimball fact table — one row per price observation
    columns:
      - name: price_key
        tests:
          - unique
          - not_null
      - name: symbol
        tests:
          - not_null
      - name: price_usd
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: agg_daily_summary
    description: Pre-aggregated daily OHLCV summary per symbol
    columns:
      - name: price_date
        tests:
          - not_null
      - name: symbol
        tests:
          - not_null
